<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Bedroom | US Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<button class="back-button" onclick="goBack()">&#10094; Back</button>

<section class="room-page">

    <h1 class="fade-up">Master Bedroom</h1>

    <div class="room-grid">

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img1.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img2.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img3.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img4.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img5.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img6.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img7.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img8.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img9.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/project1/master-bedroom/img10.jpg" onclick="openViewer(this.src)">
        </div>

    </div>

</section>

<div class="room-navigation">
    <a href="bedroom2.html" class="nav-btn prev">← Bedroom 2</a>
    <span></span>
</div>

<!-- FULLSCREEN VIEW -->
<div id="viewer">
    <span class="close-btn" onclick="closeViewer()">✕</span>
    <img id="viewerImg">
</div>

<script>
function goBack() {
    window.history.back();
}

function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* ANIMATION */
window.addEventListener("load", () => {
    document.querySelector(".fade-up").classList.add("show");
});
</script>

</body>
</html>
