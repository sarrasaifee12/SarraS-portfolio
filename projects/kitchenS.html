<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kitchen | Project S</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<button class="back-button" onclick="goBack()">&#10094; Back</button>

<section class="room-page">

    <h1 class="fade-up">Kitchen</h1>

    <div class="room-grid">

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img1.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img2.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img3.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img4.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img5.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img6.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img7.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img8.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img9.jpg" onclick="openViewer(this.src)">
        </div>

        <div class="room-img">
            <img src="../assets/images/interior/urban-nest/kitchen/img10.jpg" onclick="openViewer(this.src)">
        </div>

    </div>

    <!-- NAVIGATION -->
    <div class="room-navigation">
        <a href="bedroom3S.html" class="nav-btn prev">← Bedroom 3</a>
        <a href="livingS.html" class="nav-btn next">Living Area →</a>
    </div>

</section>

<!-- FULLSCREEN VIEW -->
<div id="viewer">
    <span class="close-btn" onclick="closeViewer()">✕</span>
    <img id="viewerImg">
</div>

<script>
function goBack() {
    window.history.back();
}

function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* ENTRY ANIMATION */
window.addEventListener("load", () => {
    document.querySelector(".fade-up").classList.add("show");
});
</script>

</body>
</html>
