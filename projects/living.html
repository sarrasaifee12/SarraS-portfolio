<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Area | US Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<button class="back-button" onclick="goBack()">&#10094; Back</button>

<section class="room-page">

    <h1 class="fade-up">Living Area</h1>

    <div class="living-grid">

    <!-- HERO -->
    <div class="living-img large">
        <img src="../assets/images/interior/project1/living/img1.jpg" onclick="openViewer(this.src)">
    </div>

    <!-- REST GRID -->
    <div class="living-img"><img src="../assets/images/interior/project1/living/img2.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img3.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img4.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img5.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img6.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img7.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img8.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img9.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img10.jpg" onclick="openViewer(this.src)"></div>
    <div class="living-img"><img src="../assets/images/interior/project1/living/img11.jpg" onclick="openViewer(this.src)"></div>

</div>


    <!-- NAVIGATION -->
    <div class="room-navigation">
        <a href="kitchen.html" class="nav-btn prev">← Kitchen</a>
        <a href="pooja.html" class="nav-btn next">Pooja Room →</a>
    </div>

</section>

<!-- FULLSCREEN VIEW -->
<div id="viewer">
    <span class="close-btn" onclick="closeViewer()">✕</span>
    <img id="viewerImg">
</div>

<script>
function goBack() {
    window.history.back();
}

function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}

/* ANIMATION */
window.addEventListener("load", () => {
    document.querySelector(".fade-up").classList.add("show");
});
</script>

</body>
</html>
