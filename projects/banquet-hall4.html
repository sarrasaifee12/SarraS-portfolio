    <div class="hall-gallery">

        <img src="../assets/images/interior/banquet/hall4/img1.png" onclick="openViewer(this.src)">
        <img src="../assets/images/interior/banquet/hall4/img2.png" onclick="openViewer(this.src)">

<!-- FULLSCREEN VIEW -->
<div id="viewer">
    <span onclick="closeViewer()" class="close-btn">✕</span>
    <img id="viewerImg">
</div>

<script>
function openViewer(src) {
    document.getElementById("viewer").style.display = "flex";
    document.getElementById("viewerImg").src = src;
}

function closeViewer() {
    document.getElementById("viewer").style.display = "none";
}
</script>
