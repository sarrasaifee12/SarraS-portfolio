<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nagrani Residence | Sarra Saifee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<button class="back-button" onclick="goBack()">&#10094; Back</button>

<div class="slideshow-container">

    <div class="slide active">
        <img src="../assets/images/professional/nagrani/plan-1.jpg">
    </div>

    <div class="slide">
        <img src="../assets/images/professional/nagrani/plan-2.jpg">
    </div>

    <div class="slide">
        <img src="../assets/images/professional/nagrani/plan-3.jpg">
    </div>

    <div class="prev" onclick="changeSlide(-1)">&#10094;</div>
    <div class="next" onclick="changeSlide(1)">&#10095;</div>

</div>

<section class="project-content">

    <h1>Nagrani Residence</h1>
    <p class="project-meta">
    Private Villa Planning · 2025 · S-SPACE Architects<br>
    Location: Vijay Nagar, Indore
</p>
    <div class="project-text">
        <p>
            A villa planning project emphasizing spatial hierarchy, privacy,
            and functional zoning. The layout explores efficient planning
            strategies for a contemporary residential environment.
        </p>
    </div>

</section>

<script>
let currentSlide = 0;
let slides = document.getElementsByClassName("slide");

function changeSlide(direction) {
    slides[currentSlide].classList.remove("active");
    currentSlide += direction;

    if (currentSlide < 0) currentSlide = slides.length - 1;
    if (currentSlide >= slides.length) currentSlide = 0;

    slides[currentSlide].classList.add("active");
}

function goBack() {
    window.history.back();
}
</script>

</body>
</html>
